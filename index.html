<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- 🔥 PRIMARY SEO -->
  <title>Velnix Solutions-AI Development Company</title>

  <meta name="description"
    content="Velnix Solutions is an AI development company offering machine learning, NLP, chatbot development, and intelligent automation solutions to scale your business." />

  <meta name="keywords"
    content="AI development company, machine learning services, NLP solutions, chatbot development, AI automation, generative AI, Velnix Solutions" />

  <meta name="author" content="Velnix Solutions" />
  <meta name="robots" content="index, follow" />

  <!-- 🌍 CANONICAL -->
  <link rel="canonical" href="https://velnixsolutions.com/" />

  <!-- 📍 GEO SEO -->
  <meta name="geo.region" content="PK-SD" />
  <meta name="geo.placename" content="Karachi" />

  <!-- 📱 MOBILE + THEME -->
  <meta name="theme-color" content="#0B0C10" />

  <!-- 🔗 OPEN GRAPH (FACEBOOK, LINKEDIN) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Velnix Solutions - AI Development Company" />
  <meta property="og:description"
    content="Transform your business with AI automation, machine learning, NLP, and chatbot solutions." />
  <meta property="og:url" content="https://velnixsolutions.com/" />
  <meta property="og:image" content="https://velnixsolutions.com/image/preview.png" />

  <!-- 🐦 TWITTER SEO -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Velnix Solutions | AI Company" />
  <meta name="twitter:description"
    content="Smart AI automation and machine learning solutions for modern businesses." />
  <meta name="twitter:image" content="https://velnixsolutions.com/image/preview.png" />

  <!-- 🔖 FAVICON -->
  <link rel="icon" type="image/png" href="/image/logo/title-logo.png" />

  <!-- ⚡ PERFORMANCE -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- 🔤 FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- 🧠 STRUCTURED DATA (ORGANIZATION) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Velnix Solutions",
    "url": "https://velnixsolutions.com",
    "logo": "https://velnixsolutions.com/image/logo.png",
    "description": "AI development company specializing in machine learning, NLP, chatbot development, and automation.",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Karachi",
      "addressCountry": "Pakistan"
    },
    "sameAs": [
      "https://linkedin.com/company/velnixsolutions",
      "https://twitter.com/velnixsolutions"
    ]
  }
  </script>

  <!-- 💼 SERVICES SCHEMA -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Service",
    "serviceType": "AI Development & Automation",
    "provider": {
      "@type": "Organization",
      "name": "Velnix Solutions"
    },
    "areaServed": "Worldwide",
    "description": "AI development, machine learning models, NLP systems, chatbot development, and business automation."
  }
  </script>

  <!-- 🚀 BASIC STYLE -->
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0B0C10;
      color: #ffffff;
    }
  </style>

</head>

<body>
  <div id="root"></div>

  <!-- MAIN APP -->
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
