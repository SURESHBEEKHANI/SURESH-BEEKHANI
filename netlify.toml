[build]
  functions = "netlify/functions"
  publish = "dist"
  command = "npm run build"

  # Allow the frontend-safe anon key to appear in build output
  [build.environment]
    SECRETS_SCAN_OMIT_KEYS = ["VITE_SUPABASE_ANON_KEY"]

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"

[dev]
  command = "npm run dev"
  targetPort = 5173
  framework = "#custom"